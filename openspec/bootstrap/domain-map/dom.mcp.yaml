domain:
  id: dom.mcp
  name: MCP Protocol Server
  intent: Implements MCP JSON-RPC 2.0 protocol server over stdio transport with auto-detection of framing modes

capabilities:
  - id: cap.mcp.protocol
    name: JSON-RPC Protocol
    intent: Handle JSON-RPC 2.0 requests/responses with method routing and error handling
    code_refs:
      - path: src/mcp/types.rs
        lines: 1-200
        note: JsonRpcRequest/Response types
      - path: src/mcp/server.rs
        lines: 1-300
        note: Protocol handling logic

  - id: cap.mcp.transport
    name: Transport Framing
    intent: Auto-detect and handle line-delimited JSON vs LSP Content-Length framing
    code_refs:
      - path: src/mcp/server.rs
        lines: 100-200
        note: Transport detection and framing

  - id: cap.mcp.tools
    name: Tool Registration
    intent: Register and expose MCP tools (search_context, enhance_prompt) to clients
    code_refs:
      - path: src/mcp/server.rs
        lines: 200-400
        note: tools/list and tools/call handlers
      - path: src/tools/mod.rs
        lines: 1-50
        note: Tool module exports

relations:
  depends_on: []
  contained_by: []
  contains:
    - id: dom.indexing
      reason: Exposes indexing capabilities as MCP tools
    - id: dom.enhancement
      reason: Exposes prompt enhancement as MCP tool

code_refs:
  - path: src/mcp/server.rs
    lines: 1-500
    note: Main MCP server implementation
  - path: src/mcp/types.rs
    lines: 1-200
    note: JSON-RPC type definitions
  - path: src/main.rs
    lines: 1-200
    note: CLI entry point and server startup
