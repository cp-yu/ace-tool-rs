domain:
  id: dom.enhancement
  name: Prompt Enhancement
  intent: Enhances user prompts by combining codebase context and conversation history for clearer, actionable requests

capabilities:
  - id: cap.enhancement.orchestrate
    name: Enhancement Orchestration
    intent: Coordinate codebase context retrieval, API calls, and result formatting
    code_refs:
      - path: src/enhancer/prompt_enhancer.rs
        lines: 1-400
        note: PromptEnhancer main logic
      - path: src/enhancer/templates.rs
        lines: 1-200
        note: System prompt templates

  - id: cap.enhancement.webui
    name: Web UI Server
    intent: Serve interactive web interface for reviewing and confirming enhanced prompts
    code_refs:
      - path: src/enhancer/server.rs
        lines: 1-400
        note: HTTP server with SSE streaming
      - path: src/enhancer/server.rs
        lines: 400-600
        note: HTML/CSS/JS templates

  - id: cap.enhancement.api
    name: API Integration
    intent: Route enhancement requests to configured backend (Augment/Claude/OpenAI/Gemini/Codex)
    code_refs:
      - path: src/service/mod.rs
        lines: 1-100
        note: Service routing logic
      - path: src/tools/enhance_prompt.rs
        lines: 1-200
        note: MCP tool wrapper

relations:
  depends_on:
    - id: dom.integration
      reason: Uses third-party API services for enhancement
    - id: dom.indexing
      reason: Retrieves codebase context for enhancement
  contained_by:
    - id: dom.mcp
      reason: Exposed as MCP tool
  contains: []

code_refs:
  - path: src/enhancer/prompt_enhancer.rs
    lines: 1-400
    note: Core enhancement logic
  - path: src/enhancer/server.rs
    lines: 1-600
    note: Web UI HTTP server
  - path: src/enhancer/templates.rs
    lines: 1-200
    note: Prompt templates
  - path: src/tools/enhance_prompt.rs
    lines: 1-200
    note: MCP tool implementation
